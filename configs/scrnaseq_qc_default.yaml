# QC Pipeline Configuration

analysis: 
  cellbender: 'cellbender_analysis'
  cellranger: 'cellranger.v.9.0.0_analysis'

random_seed: 281330800

valid_timepoints:
  - 3_weeks
  - 7_weeks
  - 18.4_week_dams
  - 7_months
  - 18_months

emptydrops:
  default:
    lower_umi_bound: 100
    niters: 10000
    fdr_cutoff: 0.01

  month7: # Overrides just for month 7
    lower_umi_bound: 75

scdblfinder:
  default:
    dbr_per1k: 0.008

filtering:
  default:
    min_genes: 200
    max_genes: 5000
    min_umis: 100
    max_umis: 10000
    max_mito_percent: 8
    mad_mito_percent: 3
    mad_genes: 3
    mad_umis: 3
